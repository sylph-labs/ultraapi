name: Bug report
description: Report a runtime, OpenAPI, or macro behavior bug
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve UltraAPI.
        Please provide a minimal reproducible case.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Include code snippets and commands
      placeholder: |
        1) create app ...
        2) run cargo test ...
        3) see output ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      render: shell
  - type: input
    id: version
    attributes:
      label: UltraAPI version
      placeholder: e.g. 0.1.x
    validations:
      required: true
  - type: input
    id: rust
    attributes:
      label: Rust version
      placeholder: e.g. rustc 1.87.0
